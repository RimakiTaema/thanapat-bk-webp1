<!DOCTYPE html>
<html lang="th">
<head>
    <style>
        .img-container { position: relative; display: inline-block; }
        .img-fallback { background: #f0f0f0; display: flex; align-items: center; justify-content: center; color: #666; font-family: sans-serif; height: 300px; width: 100%; }
    </style>
</head>
<body>

<h1>วัฒนธรรมและประเพณี</h1>

<div class="img-container" data-src="https://upload.wikimedia.org/wikipedia/commons/a/a3/Lotus_for_Songkran_festival_2019.JPG" data-timeout="8000">
    <div class="img-fallback" style="max-width:600px;">⏳ กำลังโหลดรูปภาพ...</div>
</div>

<p>
ได้รับอิทธิพลจากวัฒนธรรมมอญอย่างชัดเจน

ประเพณีสงกรานต์มอญ

การเล่นสะบ้ามอญ

การแสดงรำมอญ

การทำข้าวแช่ในช่วงสงกรานต์
</p>

<script>
(function() {
    const containers = document.querySelectorAll('.img-container[data-src]');
    containers.forEach(container => {
        const src = container.getAttribute('data-src');
        const timeout = parseInt(container.getAttribute('data-timeout') || '8000');
        let loaded = false;
        let timeoutId = setTimeout(() => {
            if (!loaded) container.innerHTML = `<a href="${src}" target="_blank">📥 คลิกดาวน์โหลดรูปภาพ</a>`;
        }, timeout);
        const img = new Image();
        img.onload = () => { loaded = true; clearTimeout(timeoutId); container.innerHTML = ''; img.style.maxWidth = '600px'; container.appendChild(img); };
        img.onerror = () => { loaded = true; clearTimeout(timeoutId); container.innerHTML = `<a href="${src}" target="_blank">⚠️ ไม่สามารถโหลดรูปภาพ คลิกเพื่อเปิด</a>`; };
        img.src = src;
    });
})();
</script>

</body>
</html>
