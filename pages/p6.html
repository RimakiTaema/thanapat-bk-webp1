<h1>วัฒนธรรมและประเพณี</h1>

<img src="" alt="วัฒนธรรมและประเพณี" style="max-width:600px;">

<p>
ได้รับอิทธิพลจากวัฒนธรรมมอญอย่างชัดเจน

ประเพณีสงกรานต์มอญ
