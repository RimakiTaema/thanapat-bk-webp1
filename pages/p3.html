<h1>ภูมิอากาศ</h1>

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/bb/004_Barge_on_Chao_Phraya_River_%28Menam%29_in_Pathum_Thani_province%2C_Thailand.jpg/250px-004_Barge_on_Chao_Phraya_River_%28Menam%29_in_Pathum_Thani_province%2C_Thailand.jpg" alt="สภาพอากาศดาวเทียม ปทุมธานี" style="max-width:600px;">

<p>
มีภูมิอากาศแบบร้อนชื้น (เขตร้อนแบบสะวันนา) อุณหภูมิเฉลี่ยประมาณ 27–28 องศาเซลเซียส

ฤดูร้อน: มีนาคม–พฤษภาคม

ฤดูฝน: มิถุนายน–ตุลาคม

ฤดูหนาว: พฤศจิกายน–กุมภาพันธ์
</p>
