<h1>เศรษฐกิจและอุตสาหกรรม</h1>

<img src="" alt="เศรษฐกิจและอุตสาหกรรม" style="max-width:600px;">

<p>
เศรษฐกิจของจังหวัดประกอบด้วย

เกษตรกรรม เช่น ข้าว ผัก ผลไม้

ตลาดค้าส่งขนาดใหญ่ เช่น ตลาดไท

นิคมอุตสาหกรรม เช่น นวนคร บางกะดี

ศูนย์วิทยาศาสตร์และเทคโนโลยี เช่น อุทยานวิทยาศาสตร์ประเทศไทย
</p>
